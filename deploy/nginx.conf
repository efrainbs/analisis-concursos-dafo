server {
    listen 80;
    server_name tudominio.pe www.tudominio.pe;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name tudominio.pe www.tudominio.pe;

    ssl_certificate     /etc/letsencrypt/live/tudominio.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.pe/privkey.pem;

    location /static/ {
        alias /home/efrain/Projects/Analisis_Concursos_DAFO/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
